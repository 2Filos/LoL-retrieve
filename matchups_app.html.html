<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>matchup editor</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; color: #333; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 10px; font-size: 16px; }
        .search-box button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        textarea { width: 100%; height: 400px; padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 14px; margin-bottom: 10px; }
        #status { font-weight: bold; color: #555; }
        .error-banner { background: #fee; color: #b00; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <h2>Matchup Text Editor (Public Repo Safe Layout)</h2>
    
    <div id="configError" class="error-banner">
        <strong>Missing Configuration:</strong> config.js was not detected locally. Please check your local project folder structure.
    </div>

    <div class="search-box">
        <input type="text" id="matchupName" placeholder="Enter matchup (e.g., ryu-vs-ken)">
        <button onclick="loadMatchup()">Load / Bind Matchup</button>
    </div>

    <h3 id="currentFileLabel">No file loaded</h3>
    <textarea id="editor" placeholder="Your text will load here. Changes auto-save 1.5 seconds after typing stops..." disabled></textarea>
    <div id="status">Status: Ready</div>

    <script src="config.js" onerror="handleConfigMissing()"></script>

    <script>
        let currentSha = null; 
        let autoSaveTimeout = null;
        let isConfigValid = true;

        function handleConfigMissing() {
            isConfigValid = false;
            document.getElementById('configError').style.display = 'block';
            document.getElementById('status').innerText = "Status: Configuration missing.";
        }

        // Custom communication bridge wrapper for Tampermonkey
        function bridgeFetch(url, options = {}) {
            return new Promise((resolve, reject) => {
                const requestId = Math.random().toString(36).substr(2, 9);
                
                const responseHandler = (e) => {
                    window.removeEventListener(`FromTampermonkeyBridge_${requestId}`, responseHandler);
                    resolve({
                        ok: e.detail.ok,
                        status: e.detail.status,
                        json: () => JSON.parse(e.detail.responseText),
                        text: () => e.detail.responseText
                    });
                };
                window.addEventListener(`FromTampermonkeyBridge_${requestId}`, responseHandler);

                window.dispatchEvent(new CustomEvent("ToTampermonkeyBridge", {
                    detail: {
                        requestId: requestId,
                        url: url,
                        method: options.method || "GET",
                        headers: options.headers || {},
                        body: options.body || null
                    }
                }));
            });
        }

        function getAPIConfig() {
            if (!isConfigValid || typeof CONFIG === 'undefined') {
                alert("Cannot proceed: config.js is missing or invalid.");
                throw new Error("Missing local configuration mapping.");
            }
            return {
                url: `https://api.github.com/repos/${CONFIG.GITHUB_REPO}/contents/`,
                headers: {
                    "Authorization": `token ${CONFIG.GITHUB_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json"
                }
            };
        }

        async function loadMatchup() {
            let config;
            try { config = getAPIConfig(); } catch(e) { return; }

            let name = document.getElementById('matchupName').value.trim().toLowerCase();
            if(!name) return alert("Please enter a matchup name!");
            if(!name.endsWith('.txt')) name += '.txt';

            const statusEl = document.getElementById('status');
            const editorEl = document.getElementById('editor');
            
            statusEl.innerText = `Searching via Tampermonkey bridge for ${name}...`;
            currentSha = null; 

            try {
                const response = await bridgeFetch(config.url + name, { headers: config.headers });
                
                if (response.status === 404) {
                    statusEl.innerText = "Matchup file not found online. Ready to create a new file.";
                    document.getElementById('currentFileLabel').innerText = `Editing New File: ${name}`;
                    editorEl.value = "";
                    editorEl.disabled = false;
                } else if (response.ok) {
                    const data = response.json();
                    currentSha = data.sha; 
                    
                    const decodedText = decodeURIComponent(escape(atob(data.content)));
                    
                    document.getElementById('currentFileLabel').innerText = `Editing: ${name}`;
                    editorEl.value = decodedText;
                    editorEl.disabled = false;
                    statusEl.innerText = "Loaded successfully from public repository!";
                } else {
                    statusEl.innerText = `Error code: ${response.status}`;
                }
            } catch (err) {
                statusEl.innerText = "Bridge connection failure: " + err.message;
            }
        }

        document.getElementById('editor').addEventListener('input', () => {
            document.getElementById('status').innerText = "Typing... waiting to background sync.";
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(saveToGitHub, 1500);
        });

        async function saveToGitHub() {
            let config;
            try { config = getAPIConfig(); } catch(e) { return; }

            let name = document.getElementById('matchupName').value.trim().toLowerCase();
            if(!name.endsWith('.txt')) name += '.txt';

            const textContent = document.getElementById('editor').value;
            const statusEl = document.getElementById('status');

            statusEl.innerText = "Pushing through proxy bridge to public repository...";

            const encodedContent = btoa(unescape(encodeURIComponent(textContent)));
            const bodyData = {
                message: `Automated bridge sync: updated ${name}`,
                content: encodedContent
            };
            
            if (currentSha) {
                bodyData.sha = currentSha;
            }

            try {
                const response = await bridgeFetch(config.url + name, {
                    method: 'PUT',
                    headers: config.headers,
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    const result = response.json();
                    currentSha = result.content.sha; 
                    statusEl.innerText = "Changes safely saved online via Tampermonkey!";
                } else {
                    const errData = response.json();
                    statusEl.innerText = `Save failed: ${errData.message}`;
                }
            } catch (err) {
                statusEl.innerText = "Sync error: " + err.message;
            }
        }
    </script>
</body>
</html>

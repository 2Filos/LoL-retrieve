<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>matchup editor</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        background: #f9f9f9;
        color: #333;
      }
      .config-box {
        background: #eee;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
      }
      .config-box input {
        margin: 5px 0;
        padding: 5px;
        width: 95%;
      }
      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .search-box input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
      }
      .search-box button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      textarea {
        width: 100%;
        height: 400px;
        padding: 10px;
        box-sizing: border-box;
        font-family: monospace;
        font-size: 14px;
        margin-bottom: 10px;
      }
      #status {
        font-weight: bold;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h2>Matchup Text Editor (GitHub Cloud Sync)</h2>

    <!-- Configuration Area -->
    <div class="config-box">
      <h3>1. Setup Authentication</h3>
      <input
        type="password"
        id="ghToken"
        placeholder="GitHub Personal Access Token (classic)"
      />
      <input
        type="text"
        id="ghRepo"
        placeholder="GitHub Username/Repository Name (e.g., john_doe/matchups)"
      />
    </div>

    <!-- Matchup Binding / Search -->
    <div class="search-box">
      <input
        type="text"
        id="matchupName"
        placeholder="Enter matchup (e.g., ryu-vs-ken)"
      />
      <button onclick="loadMatchup()">Load / Bind Matchup</button>
    </div>

    <!-- Editor UI -->
    <h3 id="currentFileLabel">No file loaded</h3>
    <textarea
      id="editor"
      placeholder="Your text will load here. Changes auto-save 1.5 seconds after typing stops..."
      disabled
    ></textarea>
    <div id="status">Status: Ready</div>

    <script>
      let currentSha = null; // GitHub uses SHA hashes to verify file updates
      let autoSaveTimeout = null;

      // Automatically load saved credentials from local browser storage if they exist
      window.onload = () => {
        if (localStorage.getItem("gh_token"))
          document.getElementById("ghToken").value =
            localStorage.getItem("gh_token");
        if (localStorage.getItem("gh_repo"))
          document.getElementById("ghRepo").value =
            localStorage.getItem("gh_repo");
      };

      function getAPIConfig() {
        const token = document.getElementById("ghToken").value.trim();
        const repo = document.getElementById("ghRepo").value.trim();

        // Save settings to browser cache so you don't have to retype them every time you open the HTML
        localStorage.setItem("gh_token", token);
        localStorage.setItem("gh_repo", repo);

        return {
          url: `https://api.github.com/repos/${repo}/contents/`,
          headers: {
            Authorization: `token ${token}`,
            Accept: "application/vnd.github.v3+json",
          },
        };
      }

      async function loadMatchup() {
        const config = getAPIConfig();
        let name = document
          .getElementById("matchupName")
          .value.trim()
          .toLowerCase();
        if (!name) return alert("Please enter a matchup name!");

        // Append extension if missing
        if (!name.endsWith(".txt")) name += ".txt";

        const statusEl = document.getElementById("status");
        const editorEl = document.getElementById("editor");

        statusEl.innerText = `Searching for ${name}...`;
        currentSha = null; // Clear previous file state

        try {
          const response = await fetch(config.url + name, {
            headers: config.headers,
          });

          if (response.status === 404) {
            // File doesn't exist yet! Let the user create it.
            statusEl.innerText =
              "Matchup not found online. Ready to create a new file.";
            document.getElementById("currentFileLabel").innerText =
              `Editing New File: ${name}`;
            editorEl.value = "";
            editorEl.disabled = false;
          } else if (response.ok) {
            // File found! Parse the JSON data from GitHub
            const data = await response.json();
            currentSha = data.sha; // Save the unique ID needed for updates

            // GitHub sends text encoded in Base64; decode it back to normal text
            const decodedText = decodeURIComponent(escape(atob(data.content)));

            document.getElementById("currentFileLabel").innerText =
              `Editing: ${name}`;
            editorEl.value = decodedText;
            editorEl.disabled = false;
            statusEl.innerText = "Loaded successfully from GitHub!";
          } else {
            statusEl.innerText = `Error: Code ${response.status}`;
          }
        } catch (err) {
          statusEl.innerText = "Connection error: " + err.message;
        }
      }

      // Auto-save typing listener
      document.getElementById("editor").addEventListener("input", () => {
        document.getElementById("status").innerText =
          "Typing... waiting for break to sync.";
        clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(saveToGitHub, 1500); // Triggers 1.5s after typing stops
      });

      async function saveToGitHub() {
        const config = getAPIConfig();
        let name = document
          .getElementById("matchupName")
          .value.trim()
          .toLowerCase();
        if (!name.endsWith(".txt")) name += ".txt";

        const textContent = document.getElementById("editor").value;
        const statusEl = document.getElementById("status");

        statusEl.innerText = "Pushing changes back to GitHub cloud...";

        // Convert raw text into a standard Base64 string for GitHub's API
        const encodedContent = btoa(unescape(encodeURIComponent(textContent)));

        // Prepare the payload instructions for GitHub
        const bodyData = {
          message: `Automated sync: updated ${name}`,
          content: encodedContent,
        };

        // If the file already existed, GitHub forces us to pass the 'sha' to prove we are overwriting the latest version
        if (currentSha) {
          bodyData.sha = currentSha;
        }

        try {
          const response = await fetch(config.url + name, {
            method: "PUT",
            headers: config.headers,
            body: JSON.stringify(bodyData),
          });

          if (response.ok) {
            const result = await response.json();
            currentSha = result.content.sha; // Update the tracking SHA for subsequent edits
            statusEl.innerText = "Saved and synced online successfully!";
          } else {
            const errData = await response.json();
            statusEl.innerText = `Save failed: ${errData.message}`;
          }
        } catch (err) {
          statusEl.innerText = "Sync error: " + err.message;
        }
      }
    </script>
  </body>
</html>
